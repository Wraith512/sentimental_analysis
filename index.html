<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Sentiment Analysis</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Ubuntu', 'Segoe UI', Tahoma, sans-serif;
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 200px;
            background: linear-gradient(180deg, #87CEEB 0%, #5BC0DE 30%, #3498db 60%, #2980b9 80%, #1a5276 100%);
            background-attachment: fixed;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background bubbles */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.15) 0%, transparent 25%),
                radial-gradient(circle at 90% 80%, rgba(255,255,255,0.1) 0%, transparent 30%),
                radial-gradient(circle at 50% 50%, rgba(173,216,230,0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(144,238,144,0.08) 0%, transparent 35%),
                radial-gradient(circle at 20% 80%, rgba(0,206,209,0.1) 0%, transparent 30%);
            pointer-events: none;
            z-index: 0;
        }

        /* Animated Waves */
        .waves {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            z-index: 0;
            pointer-events: none;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background-repeat: repeat-x;
            transform-origin: center bottom;
        }

        .wave1 {
            background: linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.3) 50%, rgba(200,230,255,0.5) 100%);
            animation: wave 8s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite;
            z-index: 3;
            opacity: 0.8;
            bottom: 0;
            height: 80px;
            border-radius: 1000% 1000% 0 0;
        }

        .wave2 {
            background: linear-gradient(180deg, transparent 0%, rgba(100,200,255,0.3) 40%, rgba(150,220,255,0.5) 100%);
            animation: wave 10s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite reverse;
            z-index: 2;
            opacity: 0.6;
            bottom: 20px;
            height: 100px;
            border-radius: 1000% 1000% 0 0;
            animation-delay: -2s;
        }

        .wave3 {
            background: linear-gradient(180deg, transparent 0%, rgba(50,150,220,0.25) 30%, rgba(100,180,240,0.4) 100%);
            animation: wave 12s cubic-bezier(0.36, 0.45, 0.63, 0.53) infinite;
            z-index: 1;
            opacity: 0.5;
            bottom: 40px;
            height: 120px;
            border-radius: 1000% 1000% 0 0;
            animation-delay: -4s;
        }

        @keyframes wave {
            0% { transform: translateX(0); }
            50% { transform: translateX(-25%); }
            100% { transform: translateX(-50%); }
        }
        /* SVG Wave overlay for more detail */
        .wave-svg {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            z-index: 0;
            pointer-events: none;
        }

        .wave-svg svg {
            width: 100%;
            height: 100%;
        }

        .wave-svg path {
            animation: wavePath 6s ease-in-out infinite alternate;
        }

        @keyframes wavePath {
            0% { d: path('M0,100 C150,150 350,50 500,100 C650,150 850,50 1000,100 L1000,200 L0,200 Z'); }
            100% { d: path('M0,100 C150,50 350,150 500,100 C650,50 850,150 1000,100 L1000,200 L0,200 Z'); }
        }

        /* Floating bubbles animation */
        .bubbles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .bubble {
            position: absolute;
            bottom: -100px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(255,255,255,0.1));
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.05), inset 5px 5px 15px rgba(255,255,255,0.5);
            animation: rise linear infinite;
            opacity: 0.6;
        }

        .bubble:nth-child(1) { width: 40px; height: 40px; left: 10%; animation-duration: 15s; animation-delay: 0s; }
        .bubble:nth-child(2) { width: 25px; height: 25px; left: 20%; animation-duration: 12s; animation-delay: 2s; }
        .bubble:nth-child(3) { width: 50px; height: 50px; left: 35%; animation-duration: 18s; animation-delay: 4s; }
        .bubble:nth-child(4) { width: 30px; height: 30px; left: 50%; animation-duration: 14s; animation-delay: 1s; }
        .bubble:nth-child(5) { width: 35px; height: 35px; left: 65%; animation-duration: 16s; animation-delay: 3s; }
        .bubble:nth-child(6) { width: 45px; height: 45px; left: 80%; animation-duration: 13s; animation-delay: 5s; }
        .bubble:nth-child(7) { width: 20px; height: 20px; left: 90%; animation-duration: 11s; animation-delay: 2s; }

        @keyframes rise {
            0% { bottom: -100px; transform: translateX(0) scale(1); opacity: 0.6; }
            50% { opacity: 0.4; }
            100% { bottom: 110%; transform: translateX(50px) scale(0.8); opacity: 0; }
        }

        /* Light flare */
        .light-flare {
            position: fixed;
            top: -100px;
            right: 10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 30%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 20px;
        }

        .header h1 {
            color: #fff;
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2), 0 0 30px rgba(255,255,255,0.3);
            letter-spacing: -0.5px;
        }
